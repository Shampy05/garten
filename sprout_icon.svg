<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" width="512" height="512" role="img" aria-label="Minimalist pixel sprout app icon">
  <defs>
    <style>
      .tile   { fill: #F3F1E9; }
      .leaf-l { fill: #ABC7A2; }
      .leaf-m { fill: #74A56F; }
      .leaf-d { fill: #4E7E5B; }
    </style>
  </defs>

  <!-- rounded-square tile, off-white -->
  <rect x="8" y="8" width="496" height="496" rx="112" class="tile"/>

  <!-- light squares (outer / upper edges) -->
  <g class="leaf-l">
    <rect x="160.5" y="148.5" width="23" height="23" rx="3"/>
    <rect x="188.5" y="148.5" width="23" height="23" rx="3"/>
    <rect x="132.5" y="176.5" width="23" height="23" rx="3"/>
    <rect x="132.5" y="204.5" width="23" height="23" rx="3"/>
    <rect x="300.5" y="148.5" width="23" height="23" rx="3"/>
    <rect x="328.5" y="148.5" width="23" height="23" rx="3"/>
    <rect x="356.5" y="176.5" width="23" height="23" rx="3"/>
    <rect x="356.5" y="204.5" width="23" height="23" rx="3"/>
  </g>

  <!-- mid squares (leaf body) -->
  <g class="leaf-m">
    <rect x="160.5" y="176.5" width="23" height="23" rx="3"/>
    <rect x="188.5" y="176.5" width="23" height="23" rx="3"/>
    <rect x="160.5" y="204.5" width="23" height="23" rx="3"/>
    <rect x="188.5" y="204.5" width="23" height="23" rx="3"/>
    <rect x="300.5" y="176.5" width="23" height="23" rx="3"/>
    <rect x="328.5" y="176.5" width="23" height="23" rx="3"/>
    <rect x="300.5" y="204.5" width="23" height="23" rx="3"/>
    <rect x="328.5" y="204.5" width="23" height="23" rx="3"/>
  </g>

  <!-- dark squares (base + stem) -->
  <g class="leaf-d">
    <rect x="216.5" y="204.5" width="23" height="23" rx="3"/>
    <rect x="216.5" y="232.5" width="23" height="23" rx="3"/>
    <rect x="272.5" y="204.5" width="23" height="23" rx="3"/>
    <rect x="272.5" y="232.5" width="23" height="23" rx="3"/>
    <rect x="244.5" y="232.5" width="23" height="23" rx="3"/>
    <rect x="244.5" y="260.5" width="23" height="23" rx="3"/>
    <rect x="244.5" y="288.5" width="23" height="23" rx="3"/>
    <rect x="244.5" y="316.5" width="23" height="23" rx="3"/>
  </g>
</svg>
